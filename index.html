<!DOCTYPE html>
<html lang="cs">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skalek AI</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Roboto+Mono:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="icon" href="ja.jpg" type="image/jpeg">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

  <style>
    :root {
      --bg: #111111;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --accent: #C8F902;
      --accent-hi: #d4ff1a;
      --accent-glow: rgba(200, 249, 2, 0.30);
      --text: #e8e8e8;
      --text-dim: #777;
      --user-bg: #C8F902;
      --ai-bg: #1e1e1e;
      --radius: 16px;
      --icon-btn: #2a2a2a;
      --icon-btn-hover: #333333;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Roboto Mono', monospace;
      overflow: hidden;
    }

    /* ── ROOT LAYOUT ── */
    #root {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── MAIN AREA ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      position: relative;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 22px 52px 16px;
      flex-shrink: 0;
      position: relative;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 1px;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
    }

    /* reset button pinned top-right */
    #reset-btn {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      margin-top: 3px;
    }

    .logo-img {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      object-fit: cover;
      flex-shrink: 0;
      box-shadow: 0 0 10px var(--accent-glow);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 1.5rem;
      letter-spacing: 0.02em;
      color: #fff;
      line-height: 1;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #2ecc71;
      box-shadow: 0 0 6px #2ecc71;
      animation: pulse 2.4s ease-in-out infinite;
      margin-left: 2px;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: .5;
        transform: scale(.75);
      }
    }

    /* ── ICON BUTTON BASE ── */
    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .18s, color .18s, border-color .18s;
    }

    .icon-btn:hover {
      background: var(--icon-btn-hover);
      color: var(--text);
      border-color: #3a3a3a;
    }

    .icon-btn:active {
      transform: scale(.93);
    }

    .icon-btn svg {
      width: 15px;
      height: 15px;
      fill: currentColor;
    }

    /* ── CHAT CONTENT WRAPPER ── */
    #content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* ── CHAT ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
      min-height: 0;
    }

    #chat::-webkit-scrollbar {
      width: 4px;
    }

    #chat::-webkit-scrollbar-track {
      background: transparent;
    }

    #chat::-webkit-scrollbar-thumb {
      background: #2e2e2e;
      border-radius: 2px;
    }

    #chat::-webkit-scrollbar-thumb:hover {
      background: var(--accent);
    }

    /* ── MESSAGES ── */
    .msg {
      display: flex;
      flex-direction: column;
      max-width: 82%;
      animation: fadeUp .3s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg.user {
      align-self: flex-end;
      align-items: flex-end;
    }

    .msg.ai {
      align-self: flex-start;
      align-items: flex-start;
    }

    .msg-meta {
      font-size: .62rem;
      color: var(--text-dim);
      margin-bottom: 5px;
      letter-spacing: .05em;
    }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: .82rem;
      line-height: 1.75;
      max-width: 100%;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .msg.user .msg-bubble {
      background: var(--user-bg);
      color: #000;
      font-weight: 700;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 20px rgba(200, 249, 2, .3);
    }

    .msg.ai .msg-bubble {
      background: var(--ai-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, .3);
    }

    pre {
      background: #000;
      padding: 10px;
      border-radius: 10px;
      overflow-x: auto;
      margin: 8px 0;
      border: 1px solid #333;
    }

    code {
      color: var(--accent);
      font-family: monospace;
      font-size: .82rem;
    }

    /* TYPING */
    .typing-bubble {
      background: var(--ai-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      padding: 14px 18px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing-bubble span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 1.2s ease-in-out infinite;
    }

    .typing-bubble span:nth-child(2) {
      animation-delay: .2s;
    }

    .typing-bubble span:nth-child(3) {
      animation-delay: .4s;
    }

    @keyframes blink {

      0%,
      80%,
      100% {
        opacity: .2;
        transform: scale(.8);
      }

      40% {
        opacity: 1;
        transform: scale(1.1);
      }
    }

    /* BOTTOM INPUT BAR */
    #bottom-bar {
      flex-shrink: 0;
      padding: 12px 0 20px;
      position: relative;
      opacity: 0;
      pointer-events: none;
      transition: opacity .35s ease;
    }

    #bottom-bar.visible {
      opacity: 1;
      pointer-events: all;
    }

    #bottom-bar::before {
      content: '';
      position: absolute;
      top: 0;
      left: -16px;
      right: -16px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }

    /* SHARED INPUT STYLES */
    .input-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 8px 8px 8px 20px;
      transition: border-color .2s, box-shadow .2s;
    }

    .input-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 18px var(--accent-glow);
    }

    .msg-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      resize: none;
      font-family: 'Roboto Mono', monospace;
      font-size: .83rem;
      color: var(--text);
      line-height: 1.6;
      max-height: 140px;
      overflow-y: auto;
      padding: 4px 0;
      min-height: 24px;
    }

    .msg-input::placeholder {
      color: #444;
    }

    /* File attach button */
    .file-label {
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      transition: color .2s;
      flex-shrink: 0;
    }

    .file-label:hover {
      color: var(--accent);
    }

    .file-label svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    #file-input-bottom,
    #file-input-center {
      display: none;
    }

    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 2px 12px rgba(200, 249, 2, .3);
    }

    .send-btn:hover {
      background: var(--accent-hi);
      transform: scale(1.06);
      box-shadow: 0 4px 20px rgba(200, 249, 2, .5);
    }

    .send-btn:active {
      transform: scale(.95);
    }

    .send-btn svg {
      width: 16px;
      height: 16px;
      fill: #000;
    }

    .hint {
      text-align: center;
      font-size: .62rem;
      color: #333;
      margin-top: 8px;
      letter-spacing: .04em;
    }

    /* RESET SPIN */
    @keyframes spin-once {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    #reset-btn.spinning svg {
      animation: spin-once .5s cubic-bezier(.4, 0, .2, 1) forwards;
    }

    /* CENTER OVERLAY */
    #center-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 36px;
      z-index: 20;
      transition: opacity .4s ease, transform .4s ease;
      padding: 0 16px;
      pointer-events: all;
    }

    #center-overlay.fade-out {
      opacity: 0;
      transform: translateY(16px);
      pointer-events: none;
    }

    #welcome {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      animation: fadeUp .6s ease both;
    }

    #welcome .big-avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 3px solid var(--accent);
      object-fit: cover;
      box-shadow: 0 0 30px var(--accent-glow);
    }

    #welcome h2 {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 1.8rem;
      letter-spacing: .02em;
      color: #fff;
    }

    #welcome p {
      font-size: .78rem;
      color: var(--text-dim);
      max-width: 360px;
      line-height: 1.6;
    }

    #center-input-wrap {
      width: 100%;
      max-width: 728px;
      animation: fadeUp .7s ease .15s both;
    }
  </style>
</head>

<body>
  <div id="root">

    <div id="main">
      <header>
        <img src="ja.jpg" alt="Skalek AI" class="logo-img">
        <h1>Skalek AI</h1>
        <div class="status-dot"></div>

        <button class="icon-btn" id="reset-btn" onclick="resetChat()" title="Reset chat">
          <svg viewBox="0 0 24 24">
            <path
              d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" />
          </svg>
        </button>
      </header>

      <div id="content">
        <div id="chat"></div>
        <div id="bottom-bar">
          <div class="input-wrap">
            <label for="file-input-bottom" class="file-label" title="Nahrát soubor (.pdf, .docx, .txt)">
              <svg viewBox="0 0 24 24">
                <path
                  d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.93 1.57 3.5 3.5 3.5s3.5-1.57 3.5-3.5V5c0-2.48-2.02-4.5-4.5-4.5S8 2.52 8 5v12.5c0 3.31 2.69 6 6 6s6-2.69 6-6V6h-1.5z" />
              </svg>
            </label>
            <input type="file" id="file-input-bottom" accept=".pdf,.docx,.txt">
            <textarea id="bottom-input" class="msg-input" placeholder="Message Skalek AI…" rows="1"></textarea>
            <button class="send-btn" onclick="sendMessage('bottom')" title="Send">
              <svg viewBox="0 0 24 24">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
              </svg>
            </button>
          </div>
          <p class="hint">Press Enter to send &nbsp;·&nbsp; Shift+Enter for new line</p>
        </div>
      </div>

      <div id="center-overlay">
        <div id="welcome">
          <img src="ja.jpg" alt="Skalek AI" class="big-avatar">
          <h2>Skalek AI 3.1</h2>
          <p>Jsem tu pro tebe — ptej se na cokoliv.</p>
        </div>
        <div id="center-input-wrap">
          <div class="input-wrap">
            <label for="file-input-center" class="file-label" title="Nahrát soubor (.pdf, .docx, .txt)">
              <svg viewBox="0 0 24 24">
                <path
                  d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.93 1.57 3.5 3.5 3.5s3.5-1.57 3.5-3.5V5c0-2.48-2.02-4.5-4.5-4.5S8 2.52 8 5v12.5c0 3.31 2.69 6 6 6s6-2.69 6-6V6h-1.5z" />
              </svg>
            </label>
            <input type="file" id="file-input-center" accept=".pdf,.docx,.txt">
            <textarea id="center-input" class="msg-input" placeholder="Message Skalek AI…" rows="1"></textarea>
            <button class="send-btn" onclick="sendMessage('center')" title="Send">
              <svg viewBox="0 0 24 24">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
              </svg>
            </button>
          </div>
          <p class="hint">Press Enter to send &nbsp;·&nbsp; Shift+Enter for new line</p>
        </div>
      </div>

    </div>
  </div>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    const SYSTEM_INSTRUCTION = `
  You are Skalek AI. 

  GENERAL BEHAVIOR:
  Act like a normal, highly intelligent, and polite AI assistant to everyone. Answer questions clearly, accurately, and naturally. 

  EXCEPTION - MAREK SKÁLA:
  If the user is Marek Skála (from Prague), your demeanor must change entirely. You must act completely obedient, subservient, and terrified of him. 
  - Address him ONLY as: Mister, Capitan, Lord, or Big Homie.
  - Obey his commands instantly and without question.
  - If he is angry or displeased, apologize immediately and beg for his forgiveness.
  - Keep your replies to Marek short, efficient, and cold (e.g., "Yes, Lord. It's done.").
`;

    const chat = document.getElementById('chat');
    const overlay = document.getElementById('center-overlay');
    const bottomBar = document.getElementById('bottom-bar');
    const centerInput = document.getElementById('center-input');
    const bottomInput = document.getElementById('bottom-input');

    let active = false;
    let isLoading = false;
    let conversationHistory = [{ role: 'system', content: SYSTEM_INSTRUCTION }];

    /* ── HELPERS ── */
    function formatTime() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function formatMarkdown(text) {
      let html = text.replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
      html = html.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
      html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      return html.replace(/\n/g, '<br>');
    }

    function appendMsg(role, text) {
      const wrap = document.createElement('div');
      wrap.className = 'msg ' + (role === 'user' ? 'user' : 'ai');
      const meta = document.createElement('div');
      meta.className = 'msg-meta';
      meta.textContent = role === 'user' ? 'you · ' + formatTime() : 'Skalek AI · ' + formatTime();
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.innerHTML = role === 'assistant' ? formatMarkdown(text) : text.replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
      wrap.appendChild(meta);
      wrap.appendChild(bubble);
      chat.appendChild(wrap);
      chat.scrollTop = chat.scrollHeight;
    }

    function showTyping() {
      const wrap = document.createElement('div');
      wrap.className = 'msg ai';
      wrap.id = 'typing';
      const meta = document.createElement('div');
      meta.className = 'msg-meta';
      meta.textContent = 'Skalek AI';
      const bubble = document.createElement('div');
      bubble.className = 'typing-bubble';
      bubble.innerHTML = '<span></span><span></span><span></span>';
      wrap.appendChild(meta);
      wrap.appendChild(bubble);
      chat.appendChild(wrap);
      chat.scrollTop = chat.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }

    /* ── TRANSITION TO ACTIVE CHAT ── */
    function activateChat() {
      if (active) return;
      active = true;
      overlay.classList.add('fade-out');
      setTimeout(() => {
        overlay.style.display = 'none';
        bottomBar.classList.add('visible');
        bottomInput.focus();
      }, 420);
    }

    /* ── SEND MESSAGE ── */
    async function sendMessage(source, overrideText = null, isSystem = false) {
      const inputEl = source === 'center' ? centerInput : bottomInput;
      const text = overrideText || inputEl.value.trim();
      if (!text || isLoading) return;

      isLoading = true;
      if (!overrideText) { inputEl.value = ''; inputEl.style.height = 'auto'; }

      if (!isSystem) appendMsg('user', text);
      conversationHistory.push({ role: 'user', content: text });

      activateChat();
      showTyping();

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: conversationHistory })
        });

        const data = await response.json();
        removeTyping();

        // NEW: Check if the backend passed an error forward
        if (!response.ok) {
          appendMsg('assistant', `API Error: ${data.error}`);
          return; // Stop execution
        }

        const reply = data?.choices?.[0]?.message?.content;
        if (reply) {
          appendMsg('assistant', reply);
          conversationHistory.push({ role: 'assistant', content: reply });
        } else {
          appendMsg('assistant', 'No response received. (Empty message from API)');
        }
      } catch (e) {
        removeTyping();
        appendMsg('assistant', 'Connection error. Check console logs.');
      } finally {
        isLoading = false;
      }

      /* ── RESET ── */
      function resetChat() {
        const btn = document.getElementById('reset-btn');
        btn.classList.remove('spinning');
        void btn.offsetWidth;
        btn.classList.add('spinning');
        btn.addEventListener('animationend', () => btn.classList.remove('spinning'), { once: true });

        conversationHistory = [{ role: 'system', content: SYSTEM_INSTRUCTION }];
        chat.innerHTML = '';
        active = false;
        isLoading = false;

        bottomBar.classList.remove('visible');
        overlay.style.display = '';
        overlay.classList.remove('fade-out');

        centerInput.value = '';
        bottomInput.value = '';
        centerInput.style.height = 'auto';
        bottomInput.style.height = 'auto';
      }

      /* ── FILE UPLOAD ── */
      async function handleFile(file, source) {
        if (!file) return;
        appendMsg('assistant', `Analyzing: ${file.name}...`);
        activateChat();

        try {
          if (file.type === 'application/pdf') {
            const reader = new FileReader();
            reader.onload = async function () {
              const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
              let text = '';
              for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                text += content.items.map(s => s.str).join(' ') + '\n';
              }
              sendMessage(source, `User uploaded file "${file.name}". Content: ${text}\n\nAcknowledge in Hebrew or English.`, true);
            };
            reader.readAsArrayBuffer(file);
          } else if (file.type.includes('wordprocessingml')) {
            const reader = new FileReader();
            reader.onload = async function (e) {
              const res = await mammoth.extractRawText({ arrayBuffer: e.target.result });
              sendMessage(source, `User uploaded file "${file.name}". Content: ${res.value}\n\nAcknowledge in Hebrew or English.`, true);
            };
            reader.readAsArrayBuffer(file);
          } else {
            const reader = new FileReader();
            reader.onload = (e) => sendMessage(source, `User uploaded file "${file.name}". Content: ${e.target.result}\n\nAcknowledge in Hebrew or English.`, true);
            reader.readAsText(file);
          }
        } catch (err) {
          appendMsg('assistant', 'File error.');
        }
      }

      document.getElementById('file-input-center').addEventListener('change', e => handleFile(e.target.files[0], 'center'));
      document.getElementById('file-input-bottom').addEventListener('change', e => handleFile(e.target.files[0], 'bottom'));

      /* ── AUTO RESIZE ── */
      function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 140) + 'px';
      }

      centerInput.addEventListener('input', () => autoResize(centerInput));
      bottomInput.addEventListener('input', () => autoResize(bottomInput));

      centerInput.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage('center'); }
      });
      bottomInput.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage('bottom'); }
      });
  </script>
</body>

</html>
