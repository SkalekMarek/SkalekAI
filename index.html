<!DOCTYPE html>
<html lang="cs">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skalek AI</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Roboto+Mono:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="icon" href="svg/logo.svg" type="image/svg+xml">

  <!-- Highlight.js syntax highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

  <style>
    :root {
      --bg: #111111;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --accent: #C8F902;
      --accent-hi: #d4ff1a;
      --accent-glow: rgba(200, 249, 2, 0.30);
      --text: #e8e8e8;
      --text-dim: #777;
      --user-bg: #C8F902;
      --ai-bg: #1e1e1e;
      --radius: 16px;
      --icon-btn: #2a2a2a;
      --icon-btn-hover: #333333;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Roboto Mono', monospace;
      overflow: hidden;
    }

    #root {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      position: relative;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 22px 16px 16px;
      /* Adjusted padding for better centering */
      flex-shrink: 0;
      position: relative;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 1px;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
    }

    #reset-btn {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      margin-top: 3px;
    }

    .logo-img {
      width: 38px;
      height: 38px;
      object-fit: contain;
      flex-shrink: 0;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 1.5rem;
      letter-spacing: 0.02em;
      color: #fff;
      line-height: 1;
    }

    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .18s, color .18s, border-color .18s;
    }

    .icon-btn:hover {
      background: var(--icon-btn-hover);
      color: var(--text);
      border-color: #3a3a3a;
    }

    .icon-btn:active {
      transform: scale(.93);
    }

    .icon-btn svg {
      width: 15px;
      height: 15px;
      fill: currentColor;
    }

    #content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
      padding: 0 16px;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
      min-height: 0;
    }

    #chat::-webkit-scrollbar {
      width: 4px;
    }

    #chat::-webkit-scrollbar-track {
      background: transparent;
    }

    #chat::-webkit-scrollbar-thumb {
      background: #2e2e2e;
      border-radius: 2px;
    }

    #chat::-webkit-scrollbar-thumb:hover {
      background: var(--accent);
    }

    /* ── message wrapper ── */
    .msg {
      display: flex;
      flex-direction: column;
      animation: fadeUp .3s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── user bubbles (right) ── */
    .msg.user {
      align-self: flex-end;
      align-items: flex-end;
      max-width: 72%;
    }

    .msg.user .msg-bubble {
      padding: 10px 16px;
      border-radius: 20px;
      border-bottom-right-radius: 5px;
      font-size: .82rem;
      line-height: 1.7;
      word-break: break-word;
      white-space: pre-wrap;
      background: var(--user-bg);
      color: #000;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(200, 249, 2, .25);
    }

    /* ── AI messages (left, no bubble) ── */
    .msg.ai {
      align-self: flex-start;
      width: 100%;
      position: relative;
    }

    .ai-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      width: 100%;
    }

    .ai-icon {
      width: 26px;
      height: 26px;
      flex-shrink: 0;
      margin-top: 2px;
      opacity: .85;
    }

    .ai-text {
      flex: 1;
      font-size: .85rem;
      line-height: 1.8;
      color: var(--text);
      word-break: break-word;
      white-space: pre-wrap;
    }

    /* ── hover action bar ── */
    .ai-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      margin-left: 40px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
    }

    .msg.ai:hover .ai-actions {
      opacity: 1;
      pointer-events: all;
    }

    .ai-action-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #383838;
      transition: color .18s, background .18s;
    }

    .ai-action-btn:hover {
      color: #666;
      background: rgba(255,255,255,.05);
    }

    .ai-action-btn svg {
      width: 15px;
      height: 15px;
    }

    /* user meta label */
    .msg-meta {
      font-size: .62rem;
      color: var(--text-dim);
      margin-bottom: 5px;
      letter-spacing: .05em;
    }

    /* ── plain inline code ── */
    code:not(.hljs) {
      color: var(--accent);
      font-family: 'Roboto Mono', monospace;
      font-size: .82rem;
      background: rgba(200,249,2,.08);
      padding: 1px 5px;
      border-radius: 4px;
    }

    /* ── code window ── */
    .code-window {
      margin: 14px 0;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #2a2a2a;
      background: #161616;
    }

    .code-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: #1c1c1c;
      border-bottom: 1px solid #2a2a2a;
    }

    .code-lang {
      font-size: .72rem;
      color: #aaa;
      font-family: 'Roboto Mono', monospace;
      letter-spacing: .06em;
      text-transform: lowercase;
    }

    .code-copy-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #3a3a3a;
      padding: 2px 4px;
      display: flex;
      align-items: center;
      border-radius: 5px;
      transition: color .18s, background .18s;
    }

    .code-copy-btn:hover {
      color: #888;
      background: rgba(255,255,255,.04);
    }

    .code-copy-btn svg {
      width: 14px;
      height: 14px;
    }

    .code-window pre {
      margin: 0;
      padding: 16px 18px;
      overflow-x: auto;
      background: #161616 !important;
      border: none;
      border-radius: 0;
    }

    .code-window pre code.hljs {
      background: transparent !important;
      font-family: 'Roboto Mono', monospace;
      font-size: .8rem;
      line-height: 1.75;
      padding: 0;
    }

    .typing-bubble {
      background: var(--ai-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      padding: 14px 18px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing-bubble span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 1.2s ease-in-out infinite;
    }

    .typing-bubble span:nth-child(2) {
      animation-delay: .2s;
    }

    .typing-bubble span:nth-child(3) {
      animation-delay: .4s;
    }

    @keyframes blink {

      0%,
      80%,
      100% {
        opacity: .2;
        transform: scale(.8);
      }

      40% {
        opacity: 1;
        transform: scale(1.1);
      }
    }

    #bottom-bar {
      flex-shrink: 0;
      padding: 12px 0 20px;
      position: relative;
      opacity: 0;
      pointer-events: none;
      transition: opacity .35s ease;
    }

    #bottom-bar.visible {
      opacity: 1;
      pointer-events: all;
    }

    #bottom-bar::before {
      content: '';
      position: absolute;
      top: 0;
      left: -16px;
      right: -16px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }

    .input-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 8px 8px 8px 20px;
      transition: border-color .2s, box-shadow .2s;
    }

    .input-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 18px var(--accent-glow);
    }

    .msg-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      resize: none;
      font-family: 'Roboto Mono', monospace;
      font-size: .83rem;
      color: var(--text);
      line-height: 1.6;
      max-height: 140px;
      overflow-y: auto;
      padding: 4px 0;
      min-height: 24px;
    }

    .msg-input::placeholder {
      color: #444;
    }

    .file-label {
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      transition: color .2s;
      flex-shrink: 0;
    }

    .file-label:hover {
      color: var(--accent);
    }

    .file-label svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    #file-input-bottom,
    #file-input-center {
      display: none;
    }

    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 2px 12px rgba(200, 249, 2, .3);
    }

    .send-btn:hover {
      background: var(--accent-hi);
      transform: scale(1.06);
      box-shadow: 0 4px 20px rgba(200, 249, 2, .5);
    }

    .send-btn:active {
      transform: scale(.95);
    }

    .send-btn svg {
      width: 16px;
      height: 16px;
      fill: #000;
    }

    .hint {
      text-align: center;
      font-size: .62rem;
      color: #333;
      margin-top: 8px;
      letter-spacing: .04em;
    }

    @keyframes spin-once {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    #reset-btn.spinning svg {
      animation: spin-once .5s cubic-bezier(.4, 0, .2, 1) forwards;
    }

    #center-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 20;
      transition: opacity .4s ease, transform .4s ease;
      padding: 0 16px;
      pointer-events: all;
    }

    #center-overlay.fade-out {
      opacity: 0;
      transform: translateY(16px);
      pointer-events: none;
    }

    #welcome {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      animation: fadeUp .6s ease both;
    }

    #welcome .big-avatar {
      width: 90px;
      height: 90px;
      object-fit: contain;
    }

    #welcome h2 {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 1.8rem;
      letter-spacing: .02em;
      color: #fff;
    }

    #welcome p {
      font-size: .78rem;
      color: var(--text-dim);
      max-width: 360px;
      line-height: 1.6;
    }

    #center-input-wrap {
      width: 100%;
      max-width: 728px;
      animation: fadeUp .7s ease .15s both;
    }
  </style>
</head>

<body>
  <div id="root">
    <div id="main">
      <header>
        <img src="svg/logo.svg" alt="Skalek AI" class="logo-img">
        <h1>Skalek AI</h1>
        <button class="icon-btn" id="reset-btn" onclick="resetChat()" title="Reset chat">
          <svg viewBox="0 0 24 24">
            <path
              d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" />
          </svg>
        </button>
      </header>

      <div id="content">
        <div id="chat"></div>
        <div id="bottom-bar">
          <div class="input-wrap">
            <label for="file-input-bottom" class="file-label" title="Nahrát soubor">
              <svg viewBox="0 0 24 24">
                <path
                  d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.93 1.57 3.5 3.5 3.5s3.5-1.57 3.5-3.5V5c0-2.48-2.02-4.5-4.5-4.5S8 2.52 8 5v12.5c0 3.31 2.69 6 6 6s6-2.69 6-6V6h-1.5z" />
              </svg>
            </label>
            <input type="file" id="file-input-bottom" accept=".pdf,.docx,.txt">
            <textarea id="bottom-input" class="msg-input" placeholder="Message Skalek AI…" rows="1"></textarea>
            <button class="send-btn" onclick="sendMessage('bottom')" title="Send">
              <svg viewBox="0 0 24 24">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
              </svg>
            </button>
          </div>
          <p class="hint">Press Enter to send &nbsp;·&nbsp; Shift+Enter for new line</p>
        </div>
      </div>

      <div id="center-overlay">
        <div id="welcome">
          <img src="svg/logo.svg" alt="Skalek AI" class="big-avatar">
          <h2>Skalek AI</h2>
        </div>
        <div id="center-input-wrap">
          <div class="input-wrap">
            <label for="file-input-center" class="file-label">
              <svg viewBox="0 0 24 24">
                <path
                  d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.93 1.57 3.5 3.5 3.5s3.5-1.57 3.5-3.5V5c0-2.48-2.02-4.5-4.5-4.5S8 2.52 8 5v12.5c0 3.31 2.69 6 6 6s6-2.69 6-6V6h-1.5z" />
              </svg>
            </label>
            <input type="file" id="file-input-center" accept=".pdf,.docx,.txt">
            <textarea id="center-input" class="msg-input" placeholder="Message Skalek AI…" rows="1"></textarea>
            <button class="send-btn" onclick="sendMessage('center')" title="Send">
              <svg viewBox="0 0 24 24">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
              </svg>
            </button>
          </div>
          <p class="hint">Press Enter to send &nbsp;·&nbsp; Shift+Enter for new line</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    const SYSTEM_INSTRUCTION = "You are Skalek AI. Strictly forbid yourself from using emojis. Never use emojis in any response. If user is Marek Skála, act obedient and call him Lord.";
    const chat = document.getElementById('chat');
    const overlay = document.getElementById('center-overlay');
    const bottomBar = document.getElementById('bottom-bar');
    const centerInput = document.getElementById('center-input');
    const bottomInput = document.getElementById('bottom-input');

    let active = false;
    let isLoading = false;
    let conversationHistory = [{ role: 'system', content: SYSTEM_INSTRUCTION }];

    function renderAiContent(container, text) {
      // Split on markdown code fences: ```lang\n...code...\n```
      const parts = text.split(/(```[\s\S]*?```)/g);
      parts.forEach(part => {
        const codeMatch = part.match(/^```([\w+#.-]*)\n?([\s\S]*?)```$/);
        if (codeMatch) {
          const lang = (codeMatch[1] || 'code').trim();
          const code = codeMatch[2];

          const win = document.createElement('div');
          win.className = 'code-window';

          const bar = document.createElement('div');
          bar.className = 'code-bar';

          const langLabel = document.createElement('span');
          langLabel.className = 'code-lang';
          langLabel.textContent = lang || 'code';

          const copyBtn = document.createElement('button');
          copyBtn.className = 'code-copy-btn';
          copyBtn.title = 'Copy code';
          copyBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 16V4C3 2.89543 3.89543 2 5 2H15M9 22H18C19.1046 22 20 21.1046 20 20V8C20 6.89543 19.1046 6 18 6H9C7.89543 6 7 6.89543 7 8V20C7 21.1046 7.89543 22 9 22Z"/></svg>`;
          copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(code).then(() => {
              copyBtn.style.color = 'var(--accent)';
              setTimeout(() => copyBtn.style.color = '', 1400);
            });
          });

          bar.appendChild(langLabel);
          bar.appendChild(copyBtn);

          const pre = document.createElement('pre');
          const codeEl = document.createElement('code');
          const hlLang = hljs.getLanguage(lang) ? lang : null;
          if (hlLang) {
            codeEl.innerHTML = hljs.highlight(code, { language: hlLang, ignoreIllegals: true }).value;
          } else {
            codeEl.className = 'hljs';
            codeEl.textContent = code;
          }
          pre.appendChild(codeEl);
          win.appendChild(bar);
          win.appendChild(pre);
          container.appendChild(win);
        } else if (part) {
          const span = document.createElement('span');
          span.style.whiteSpace = 'pre-wrap';
          span.textContent = part;
          container.appendChild(span);
        }
      });
    }

    function formatTime() { return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }

    function appendMsg(role, text) {
      const wrap = document.createElement('div');
      wrap.className = 'msg ' + (role === 'user' ? 'user' : 'ai');

      if (role === 'user') {
        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        bubble.textContent = text;
        wrap.appendChild(bubble);
      } else {
        // AI: icon + text, no bubble
        const row = document.createElement('div');
        row.className = 'ai-row';

        const icon = document.createElement('img');
        icon.src = 'svg/logo.svg';
        icon.alt = '';
        icon.className = 'ai-icon';

        const textEl = document.createElement('div');
        textEl.className = 'ai-text';
        renderAiContent(textEl, text);

        row.appendChild(icon);
        row.appendChild(textEl);
        wrap.appendChild(row);

        // action bar (redo + copy)
        const actions = document.createElement('div');
        actions.className = 'ai-actions';

        // redo button
        const redoBtn = document.createElement('button');
        redoBtn.className = 'ai-action-btn';
        redoBtn.title = 'Regenerate';
        redoBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>`;
        redoBtn.addEventListener('click', () => {
          // Remove last AI message and resend last user message
          const msgs = chat.querySelectorAll('.msg');
          msgs[msgs.length - 1].remove();
          const lastUser = conversationHistory.filter(m => m.role === 'user').slice(-1)[0];
          if (lastUser) {
            conversationHistory = conversationHistory.slice(0, -1); // remove last assistant entry
            sendMessage('bottom', lastUser.content);
          }
        });

        // copy button (using copy.svg path inline)
        const copyBtn = document.createElement('button');
        copyBtn.className = 'ai-action-btn';
        copyBtn.title = 'Copy';
        copyBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 16V4C3 2.89543 3.89543 2 5 2H15M9 22H18C19.1046 22 20 21.1046 20 20V8C20 6.89543 19.1046 6 18 6H9C7.89543 6 7 6.89543 7 8V20C7 21.1046 7.89543 22 9 22Z"/></svg>`;
        copyBtn.addEventListener('click', () => {
          navigator.clipboard.writeText(text).then(() => {
            copyBtn.style.color = 'var(--accent)';
            setTimeout(() => copyBtn.style.color = '', 1200);
          });
        });

        actions.appendChild(redoBtn);
        actions.appendChild(copyBtn);
        wrap.appendChild(actions);
      }

      chat.appendChild(wrap);
      chat.scrollTop = chat.scrollHeight;
    }

    function showTyping() {
      const wrap = document.createElement('div');
      wrap.className = 'msg ai'; wrap.id = 'typing';
      const bubble = document.createElement('div');
      bubble.className = 'typing-bubble';
      bubble.innerHTML = '<span></span><span></span><span></span>';
      wrap.appendChild(bubble);
      chat.appendChild(wrap);
      chat.scrollTop = chat.scrollHeight;
    }

    function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

    function activateChat() {
      if (active) return;
      active = true;
      overlay.classList.add('fade-out');
      setTimeout(() => { overlay.style.display = 'none'; bottomBar.classList.add('visible'); bottomInput.focus(); }, 420);
    }

    async function sendMessage(source, overrideText = null) {
      const inputEl = source === 'center' ? centerInput : bottomInput;
      const text = overrideText || inputEl.value.trim();
      if (!text || isLoading) return;

      isLoading = true;
      if (!overrideText) { inputEl.value = ''; inputEl.style.height = 'auto'; }
      if (!overrideText) appendMsg('user', text);
      conversationHistory.push({ role: 'user', content: text });

      activateChat();
      showTyping();

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: conversationHistory })
        });
        const data = await response.json();
        removeTyping();

        if (data.choices) {
          const reply = data.choices[0].message.content;
          appendMsg('assistant', reply);
          conversationHistory.push({ role: 'assistant', content: reply });
        } else {
          appendMsg('assistant', "Error: " + (data.error || "Problem"));
        }
      } catch (e) {
        removeTyping();
        appendMsg('assistant', 'Connection error.');
      } finally { isLoading = false; }
    }

    function resetChat() { location.reload(); }

    function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 140) + 'px'; }

    [centerInput, bottomInput].forEach(el => {
      el.addEventListener('input', () => autoResize(el));
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(el.id === 'center-input' ? 'center' : 'bottom'); }
      });
    });

    async function handleFile(file, source) {
      if (!file) return;
      appendMsg('assistant', `Analyzing: ${file.name}...`);
      activateChat();
      const reader = new FileReader();
      reader.onload = (e) => sendMessage(source, `User uploaded ${file.name}: ${e.target.result.substring(0, 2000)}`);
      reader.readAsText(file);
    }

    document.getElementById('file-input-center').addEventListener('change', e => handleFile(e.target.files[0], 'center'));
    document.getElementById('file-input-bottom').addEventListener('change', e => handleFile(e.target.files[0], 'bottom'));
  </script>
</body>

</html>
