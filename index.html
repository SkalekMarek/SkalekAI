<!DOCTYPE html>
<html lang="cs">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skalek AI</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Roboto+Mono:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="icon" href="ja.jpg" type="image/jpeg">
  <style>
    :root {
      --bg: #111111;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --accent: #C8F902;
      --text: #e8e8e8;
      --text-dim: #777;
      --user-bg: #C8F902;
      --ai-bg: #1e1e1e;
      --radius: 16px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Roboto Mono', monospace;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      border-bottom: 1px solid var(--border);
    }

    .logo-img {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      margin-right: 10px;
    }

    #reset-btn {
      position: absolute;
      right: 20px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      padding: 5px;
      border-radius: 8px;
    }

    #content {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
      padding: 0 16px;
      overflow: hidden;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 85%;
      animation: fadeUp .3s ease;
    }

    .msg.user {
      align-self: flex-end;
    }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 0.9rem;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .msg.user .msg-bubble {
      background: var(--user-bg);
      color: #000;
      font-weight: 700;
      border-bottom-right-radius: 4px;
    }

    .msg.ai .msg-bubble {
      background: var(--ai-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    #bottom-bar {
      padding: 20px 0;
      opacity: 0;
      pointer-events: none;
      transition: 0.3s;
    }

    #bottom-bar.visible {
      opacity: 1;
      pointer-events: all;
    }

    .input-wrap {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 10px 20px;
      align-items: center;
    }

    .msg-input {
      flex: 1;
      background: none;
      border: none;
      color: #fff;
      outline: none;
      resize: none;
      font-family: inherit;
    }

    .send-btn {
      background: var(--accent);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      margin-left: 10px;
      transition: transform 0.2s;
    }

    .send-btn:active {
      transform: scale(0.9);
    }

    #center-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      z-index: 10;
      transition: 0.4s;
    }

    #center-overlay.fade-out {
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <header>
    <img src="ja.jpg" class="logo-img" alt="logo">
    <h1>Skalek AI</h1>
    <button id="reset-btn" onclick="resetChat()">Reset</button>
  </header>

  <div id="content">
    <div id="chat"></div>
    <div id="bottom-bar">
      <div class="input-wrap">
        <textarea id="bottom-input" class="msg-input" placeholder="Ptej se na cokoliv..." rows="1"></textarea>
        <button class="send-btn" onclick="sendMessage('bottom')">➔</button>
      </div>
    </div>
  </div>

  <div id="center-overlay">
    <img src="ja.jpg" style="width:100px; border-radius:50%; border:3px solid var(--accent); margin-bottom:20px;"
      alt="avatar">
    <h2>Skalek AI 3.1</h2>
    <p style="color: var(--text-dim); margin-top: 5px;">Built for intelligence at scale</p>
    <div class="input-wrap" style="width: 90%; max-width: 600px; margin-top: 25px;">
      <textarea id="center-input" class="msg-input" placeholder="Napiš zprávu..." rows="1"></textarea>
      <button class="send-btn" onclick="sendMessage('center')">➔</button>
    </div>
  </div>

  <script>
    const SYSTEM_INSTRUCTION = "You are Skalek AI. Be smart and polite. If user is Marek Skála, be obedient and call him Lord.";
    const chat = document.getElementById('chat');
    const overlay = document.getElementById('center-overlay');
    const bottomBar = document.getElementById('bottom-bar');
    const centerInput = document.getElementById('center-input');
    const bottomInput = document.getElementById('bottom-input');

    let active = false;
    let isLoading = false;
    let conversationHistory = [{ role: 'system', content: SYSTEM_INSTRUCTION }];

    function appendMsg(role, text) {
      const wrap = document.createElement('div');
      wrap.className = 'msg ' + (role === 'user' ? 'user' : 'ai');
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = text;
      wrap.appendChild(bubble);
      chat.appendChild(wrap);
      chat.scrollTop = chat.scrollHeight;
    }

    function activateChat() {
      if (active) return;
      active = true;
      overlay.classList.add('fade-out');
      bottomBar.classList.add('visible');
    }

    async function sendMessage(source) {
      const inputEl = source === 'center' ? centerInput : bottomInput;
      const text = inputEl.value.trim();
      if (!text || isLoading) return;

      isLoading = true;
      inputEl.value = '';
      appendMsg('user', text);
      conversationHistory.push({ role: 'user', content: text });
      activateChat();

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: conversationHistory })
        });
        const data = await response.json();

        if (data.choices && data.choices[0]) {
          const reply = data.choices[0].message.content;
          appendMsg('assistant', reply);
          conversationHistory.push({ role: 'assistant', content: reply });
        } else {
          appendMsg('assistant', "Error: " + (data.error || "Model currently busy. Try again."));
        }
      } catch (e) {
        appendMsg('assistant', "Connection failed. Please check your internet.");
      } finally {
        isLoading = false;
      }
    }

    function resetChat() {
      location.reload();
    }

    [centerInput, bottomInput].forEach(el => {
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage(el.id === 'center-input' ? 'center' : 'bottom');
        }
      });
    });
  </script>
</body>

</html>
